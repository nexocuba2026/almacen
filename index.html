<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Almacén</title>

<link rel="stylesheet" href="css/styles.css">

<!-- ICONOS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>


<!-- HEADER -->

<header class="header">

<div class="logo">

<img src="assets/logo.png" alt="logo">

<h1>Almacén</h1>

</div>

<div class="acciones">

<button id="btnEntradas">

<i class="fa-solid fa-box"></i> Entradas

</button>

<button id="btnSalidas">

<i class="fa-solid fa-arrow-up"></i> Salidas

</button>

</div>

</header>



<!-- BUSCADOR -->

<div class="buscador">

<input id="buscarProducto" type="text" placeholder="Buscar producto">

<button id="btnBuscar">

<i class="fa-solid fa-search"></i>

</button>

</div>



<!-- TITULO CATEGORIA -->

<h2 id="tituloCategoria">Todos los productos</h2>



<!-- PRODUCTOS -->

<section id="productosContainer" class="productos-grid"></section>



<!-- SIDEBAR CATEGORIAS -->

<div id="sidebarCategorias" class="sidebar-categorias">

<h3>Categorías</h3>

<button data-cat="todos">Todos</button>

<button data-cat="tornilleria">Tornillería</button>

<button data-cat="alimentos">Alimentos</button>

<button data-cat="herramientas">Herramientas</button>

<button data-cat="electricos">Eléctricos</button>

</div>



<!-- FOOTER -->

<footer class="footer">

<button id="btnInicio">

<i class="fa-solid fa-house"></i>

<span>Inicio</span>

</button>

<button id="btnCategorias">

<i class="fa-solid fa-layer-group"></i>

<span>Categorías</span>

</button>

<button onclick="location.href='proveedores.html'">

<i class="fa-solid fa-truck"></i>

<span>Proveedores</span>

</button>

<button onclick="location.href='estadisticas.html'">

<i class="fa-solid fa-chart-line"></i>

<span>Estadísticas</span>

</button>

</footer>



<!-- SCRIPT -->

<script type="module" src="js/app.js"></script>

</body>

</html>
