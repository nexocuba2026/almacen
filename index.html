<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Almacén</title>

<link rel="stylesheet" href="css/styles.css">

</head>


<body>


<!-- HEADER -->

<header class="header">

<div class="logo">

<img src="assets/logo.png" alt="logo">

<h1>Almacén</h1>

</div>

<div class="acciones">

<button id="btnEntradas">Entradas</button>

<button id="btnSalidas">Salidas</button>

</div>

</header>



<!-- BUSCADOR -->

<div class="buscador">

<input id="buscarProducto" type="text" placeholder="Buscar producto">

<button id="btnBuscar">Buscar</button>

</div>



<!-- TITULO CATEGORIA -->

<h2 id="tituloCategoria">Todos los productos</h2>



<!-- PRODUCTOS -->

<section id="productosContainer" class="productos-grid"></section>



<!-- SIDEBAR CATEGORIAS -->

<div id="sidebarCategorias" class="sidebar-categorias">

<h3>Categorías</h3>

<button data-cat="todos">Todos</button>

<button data-cat="tornilleria">Tornillería</button>

<button data-cat="alimentos">Alimentos</button>

<button data-cat="herramientas">Herramientas</button>

<button data-cat="electricos">Eléctricos</button>

</div>



<!-- FOOTER -->

<footer class="footer">

<button id="btnInicio">Inicio</button>

<button id="btnCategorias">Categorías</button>

<button onclick="location.href='proveedores.html'">Proveedores</button>

<button onclick="location.href='estadisticas.html'">Estadísticas</button>

</footer>



<!-- SCRIPT PRINCIPAL -->

<script type="module" src="js/app.js"></script>



</body>

</html>
