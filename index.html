<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Almacén</title>

<link rel="stylesheet" href="css/styles.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
/>

</head>



<body>



<!-- HEADER -->

<header class="header">

<div class="logo">
<img src="img/logo.png">
<h2>Almacén</h2>
</div>

<div class="acciones">
<button id="btnEntradas">Entradas</button>
<button id="btnSalidas">Salidas</button>
</div>

</header>



<!-- BUSCADOR -->

<div class="buscador">

<input id="buscadorInput" type="text" placeholder="Buscar producto">

<button id="btnBuscar">
<i class="fa-solid fa-search"></i>
</button>

</div>



<h2 id="tituloCategoria">Todos los productos</h2>



<!-- SIDEBAR CATEGORIAS -->

<div id="sidebarCategorias" class="sidebar-categorias">

<h3>Categorías</h3>

<button data-cat="todos">Todos</button>
<button data-cat="Tornillería">Tornillería</button>
<button data-cat="Alimentos">Alimentos</button>
<button data-cat="Herramientas">Herramientas</button>
<button data-cat="Eléctricos">Eléctricos</button>

</div>



<!-- PRODUCTOS -->

<div id="productosContainer" class="productos-grid"></div>



<!-- MODAL PRODUCTO -->

<div id="modalProducto" class="modal" style="display:none">

<div class="modal-content">

<span id="cerrarModal" class="modal-close">&times;</span>

<div id="detalleProducto"></div>

</div>

</div>



<!-- FOOTER -->

<footer class="footer">

<button onclick="location.reload()">
<i class="fa-solid fa-house"></i>
<span>Inicio</span>
</button>

<button id="btnCategorias">
<i class="fa-solid fa-layer-group"></i>
<span>Categorías</span>
</button>

<button>
<i class="fa-solid fa-truck"></i>
<span>Proveedores</span>
</button>

<button>
<i class="fa-solid fa-chart-column"></i>
<span>Estadísticas</span>
</button>

</footer>



<script type="module" src="js/app.js"></script>

</body>
</html>
