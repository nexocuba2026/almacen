<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Almacén</title>

<link rel="stylesheet" href="css/styles.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
/>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>

<body>

<div id="header"></div>

<!-- BUSCADOR -->
<div class="buscador">
<input id="buscadorInput" type="text" placeholder="Buscar producto">
<button id="btnBuscar">
<i class="fa-solid fa-search"></i>
</button>
</div>

<h2 id="tituloCategoria">Todos los productos</h2>

<!-- SIDEBAR CATEGORIAS -->
<div id="sidebarCategorias" class="sidebar-categorias">
<h3>Categorías</h3>
<button data-cat="todos">Todos</button>
<button data-cat="Tornillería">Tornillería</button>
<button data-cat="Alimentos">Alimentos</button>
<button data-cat="Herramientas">Herramientas</button>
<button data-cat="Eléctricos">Eléctricos</button>
</div>

<!-- PRODUCTOS -->
<div id="productosContainer" class="productos-grid"></div>

<!-- MODAL PRODUCTO -->
<div id="modalProducto" class="modal" style="display:none">
<div class="modal-content">
<span id="cerrarModal" class="modal-close">&times;</span>
<div id="detalleProducto"></div>
</div>
</div>

<div id="footer"></div>

<script type="module" src="js/loadComponents.js"></script>
<script type="module" src="js/supabase.js"></script>
<script type="module" src="js/app.js"></script>
<script type="module" src="js/auth.js"></script>
<script type="module">
import { cargarComponentes } from "./js/loadComponents.js";
cargarComponentes();
</script>
</body>
</html>
